auth:
  provider: ${AUTH_PROVIDER:firebase}
  providers:
    firebase:
      project_id: ${FIREBASE_PROJECT_ID}
      service_account_path: ${FIREBASE_SA_PATH:.secrets/firebase-service-account.json}

    azure_ad:
      tenant_id: ${AZURE_TENANT_ID}
      client_id: ${AZURE_CLIENT_ID}

    jwt:
      jwks_url: ${JWT_JWKS_URL}
      issuer: ${JWT_ISSUER}
      audience: ${JWT_AUDIENCE}

gcp:
  project_id: ${GCP_PROJECT_ID}

mcp_server:
  url: ${MCP_SERVER_URL:http://localhost:8001/mcp}
  host: ${MCP_HOST:0.0.0.0}
  port: ${MCP_PORT:8001}
  scopes:
    - "weather:read"

agent_api:
  host: ${AGENT_HOST:0.0.0.0}
  port: ${AGENT_PORT:8000}

llm:
  model: ${LLM_MODEL:openai/qwen3.5:9b}
  base_url: ${LLM_BASE_URL:http://localhost:11434/v1}
  api_key: ${LLM_API_KEY:ollama}

oauth:
  enabled: ${OAUTH_ENABLED:true}
  issuer: ${OAUTH_ISSUER:http://localhost:8001}
  access_token_ttl: ${OAUTH_ACCESS_TOKEN_TTL:3600}
  refresh_token_ttl: ${OAUTH_REFRESH_TOKEN_TTL:86400}
  auth_code_ttl: ${OAUTH_AUTH_CODE_TTL:300}
  firebase_api_key: ${FIREBASE_WEB_API_KEY:}
  firebase_auth_domain: ${FIREBASE_AUTH_DOMAIN:}
  firebase_project_id: ${FIREBASE_PROJECT_ID:}

roles:
  admin:
    scopes: ["weather:read"]
  editor:
    scopes: ["weather:read"]
  viewer:
    scopes: ["weather:read"]
